<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MediCycle Password Reset</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #eef8ff;
      color: #0077b6;
    }
    p { font-size: 16px; font-weight: 600; }
  </style>
  <script>
    window.onload = function () {
      const params = new URLSearchParams(window.location.search)
      const userId = params.get('userId')
      const secret = params.get('secret')
      if (userId && secret) {
        window.location.href =
          'medicycle://reset-password?userId=' + userId + '&secret=' + secret
      }
    }
  </script>
</head>
<body>
  <p>Redirecting to MediCycle...</p>
  <p style="font-size:13px;color:#555;">If nothing happens, open the MediCycle app manually.</p>
</body>
</html>
